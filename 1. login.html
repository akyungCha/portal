<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <title>파머스영어 회원포탈-로그인</title>
    <link rel="stylesheet" href="resource/css/reset.css" />
    <link rel="stylesheet" href="resource/css/login.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-panel">
          <img
            src="resource/images/logo_login.png"
            alt="PAMUS 로고"
            class="logo_login"
          />
          <div class="input-group">
            <i class="ri-user-line"></i>
            <input type="text" placeholder="아이디를 입력해주세요." />
          </div>

          <div class="input-group">
            <i class="ri-lock-line"></i>
            <input type="password" placeholder="비밀번호를 입력해주세요." />
          </div>

          <label class="checkbox">
            <input type="checkbox" class="checkbox-input" />
            <span class="checkbox-label">ID 저장</span>
          </label>

          <button class="login-btn">로그인</button>
        </div>

        <div class="banner-panel">
          <div class="banner-slider">
            <div class="banner-slide">
              <img src="resource/images/banner1.png" alt="배너1" />
            </div>
            <div class="banner-slide">
              <img src="resource/images/banner2.png" alt="배너2" />
            </div>
          </div>

          <div class="banner-controls">
            <button class="banner-pause">
              <span class="pause-bar"></span>
              <span class="pause-bar"></span>
            </button>
            <div class="banner-nav">
              <button class="banner-arrow">
                <i class="ri-arrow-left-s-line"></i>
              </button>
              <span class="banner-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
              </span>
              <button class="banner-arrow">
                <i class="ri-arrow-right-s-line"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="resource/js/login.js" defer></script>
  </body>
</html>
